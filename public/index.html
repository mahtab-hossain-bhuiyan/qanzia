<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Qnaxia</title>
<meta property="og:site_name" content="Qnaxia">
<meta property="og:type" content="website">
<style>
/* ── 60/30/10 COLOR RULE ────────────────────────────────
60% Dominant: #FAFBFC (warm off-white)
30% Secondary: #FFFFFF (pure white)
10% Accent: #0D9488 (teal) ─────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'DM Sans','Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg-primary);color:var(--text-primary)}
:root{--bg-primary:#FAFBFC;--bg-secondary:#fff;--text-primary:#1F2937;--text-secondary:#6B7280;--accent:#0D9488;border-color:#E5E7EB}
[data-theme="dark"]{--bg-primary:#0f172a;--bg-secondary:#1e293b;--text-primary:#f1f5f9;--text-secondary:#94a3b8;--accent:#5EEAD4;border-color:#334155}
a{text-decoration:none;color:inherit}
img{display:block;max-width:100%}
input,textarea,select,button{font-family:inherit}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* ── NAVBAR ───────────────────────────────────────── */
#nav{position:fixed;top:0;left:0;right:0;z-index:500;height:72px;display:flex;align-items:center;padding:0 8%;transition:all .35s;background:var(--bg-primary)}
#nav.solid{background:var(--bg-secondary);backdrop-filter:blur(12px);box-shadow:0 1px 0 rgba(0,0,0,.06)}
.nav-logo{font-size:24px;font-weight:800;letter-spacing:-0.5px;transition:color .3s;color:var(--text-primary)}
.nav-logo em{font-style:normal;color:var(--accent)}

/* ── TOAST ────────────────────────────────────────── */
#toast-box{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.t-item{background:#1F2937;color:#fff;padding:14px 20px;border-radius:12px;font-size:13px;font-weight:600;opacity:0;transform:translateX(24px);transition:all .3s;white-space:nowrap}
.t-item.show{opacity:1;transform:translateX(0)}
.t-item.ok{border-left:4px solid #0D9488}
.t-item.err{border-left:4px solid #EF4444}

/* ── COOKIE BANNER ─────────────────────────────── */
#ck{display:none;position:fixed;bottom:0;left:0;right:0;background:#1F2937;padding:16px 8%;z-index:9998;align-items:center;flex-wrap:wrap;gap:12px}
#ck span{flex:1;font-size:14px;color:#E5E7EB}

/* ── HERO SECTION ─────────────────────────────── */
.hero{min-height:480px;background:linear-gradient(-45deg,#1e1b4b,#312e81,#1e3a5f,#0f172a);background-size:400% 400%;animation:gradShift 14s ease infinite;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:90px 6% 70px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(13,148,136,.2) 0%,transparent 70%);pointer-events:none}
.hero-content{position:relative;z-index:1;animation:fadeUp .8s ease both}
.hero-pill{display:inline-block;background:rgba(13,148,136,.2);color:#5EEAD4;font-size:12px;font-weight:700;padding:6px 16px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;margin-bottom:28px}
.hero h1{font-size:clamp(40px,6vw,70px);font-weight:800;color:#fff;line-height:1.08;letter-spacing:-2.5px;margin-bottom:18px}
.hero p{font-size:clamp(15px,1.5vw,18px);color:#93C5FD;max-width:500px;line-height:1.65}

/* ── FEATURED POST ─────────────────────────────── */
.featured-wrap{max-width:1200px;margin:-48px auto 0;padding:0 5%;position:relative;z-index:10;animation:fadeUp .8s .2s ease both}
.featured-card{background:#fff;border-radius:24px;overflow:hidden;display:grid;grid-template-columns:1.2fr 1fr;box-shadow:0 20px 60px rgba(0,0,0,.08);transition:all .3s}
.featured-card:hover{transform:translateY(-4px);box-shadow:0 30px 80px rgba(0,0,0,.12)}
.feat-img{min-height:320px;background:linear-gradient(135deg,#0D9488,#14B8A6);position:relative;display:flex;align-items:flex-end;padding:32px}
.feat-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.feat-img-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,rgba(0,0,0,.2) 50%,transparent 100%)}
.feat-badge{position:relative;z-index:1;display:inline-block;background:#fff;color:#0D9488;font-size:11px;font-weight:800;padding:5px 14px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase}
.feat-body{padding:40px;display:flex;flex-direction:column;justify-content:center;gap:12px;background:var(--bg-secondary)}
.feat-label{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px}
.feat-title{font-size:clamp(20px,2vw,28px);font-weight:800;line-height:1.25;color:var(--text-primary)}
.feat-excerpt{font-size:15px;color:var(--text-secondary);line-height:1.7}
.feat-meta{font-size:13px;color:var(--text-secondary);display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.meta-dot{width:4px;height:4px;background:#D1D5DB;border-radius:50%}
@media(max-width:768px){.featured-card{grid-template-columns:1fr}.feat-img{min-height:220px}.feat-body{padding:28px}}

/* ── POST GRID ─────────────────────────────── */
.section{max-width:1200px;margin:0 auto;padding:64px 5%;background:var(--bg-primary)}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px}
.sec-title{font-size:20px;font-weight:800;color:var(--text-primary);display:flex;align-items:center;gap:12px}
.sec-title::before{content:'';display:block;width:5px;height:20px;background:var(--accent);border-radius:3px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px}

/* ── POST CARD ─────────────────────────────── */
.pcard{background:var(--bg-secondary);border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.08);transition:all .3s cubic-bezier(.4,0,0.2,1);display:block;color:inherit}
.pcard:hover{transform:translateY(-6px);box-shadow:0 20px 50px rgba(0,0,0,.15)}
.pcard-img{height:200px;background:linear-gradient(135deg,#E0F2F1,#F0FDFA);overflow:hidden;position:relative}
.pcard-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.pcard:hover .pcard-img img{transform:scale(1.06)}
.pcard-body{padding:24px}
.pcard-tag{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.pcard-title{font-size:18px;font-weight:700;margin:8px 0 12px;line-height:1.4;color:var(--text-primary)}
.pcard-excerpt{font-size:14px;color:var(--text-secondary);line-height:1.7}
.pcard-meta{margin-top:16px;font-size:13px;color:var(--text-secondary);display:flex;gap:10px;align-items:center}

/* ── SINGLE POST ─────────────────────────────── */
.ph{background:linear-gradient(-45deg,#1e1b4b,#312e81,#1e3a5f,#0f172a);background-size:400% 400%;padding:140px 6% 80px;text-align:center;position:relative;overflow:hidden}
.ph::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(13,148,136,.15) 0%,transparent 70%);pointer-events:none}
.ph-content{position:relative;z-index:1;max-width:900px;margin:0 auto;animation:fadeUp .8s ease both}
.ph-tags{margin-bottom:24px}
.ph-tag{display:inline-block;background:rgba(13,148,136,.25);color:#5EEAD4;font-size:11px;font-weight:700;padding:6px 16px;border-radius:20px;margin:4px;letter-spacing:.5px;text-transform:uppercase}
.ph h1{font-size:clamp(28px,5vw,52px);font-weight:800;color:#fff;line-height:1.12;letter-spacing:-1.5px;max-width:900px;margin:0 auto 24px}
.ph-meta{color:#94A3B8;font-size:14px;display:flex;gap:16px;align-items:center;justify-content:center;flex-wrap:wrap}
.ph-meta span{color:#94A3B8}
.ph-meta .author{color:#fff;font-weight:600}
.post-body{max-width:820px;margin:0 auto;padding:64px 24px}

/* Reading progress bar */
.read-progress{position:fixed;top:0;left:0;height:3px;background:#0D9488;z-index:1001;transition:width .1s}

/* ── Q&A STYLES ─────────────────────────────── */
.qa-intro{font-size:17px;line-height:1.85;color:var(--text-secondary);margin-bottom:32px;border-left:3px solid var(--accent);padding-left:20px}
.qa-count{display:inline-flex;align-items:center;gap:8px;background:var(--bg-secondary);color:var(--accent);font-size:14px;font-weight:700;padding:10px 20px;border-radius:20px;margin-bottom:28px;border:1px solid var(--accent)}
.qa-list{display:flex;flex-direction:column;gap:16px;margin-bottom:40px}
.qa-item{border-radius:20px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.1);transition:all .2s}
.qa-item:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.15)}
.qa-q{background:linear-gradient(135deg,#0D9488 0%,#14B8A6 100%);padding:20px 24px;display:flex;align-items:flex-start;gap:16px}
.qa-num{background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:900;padding:4px 12px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.qa-q-text{color:#fff;font-size:16px;font-weight:700;line-height:1.5}
.qa-a{background:var(--bg-secondary);padding:18px 24px;display:flex;align-items:flex-start;gap:16px;border-left:4px solid var(--accent)}
.qa-a-dot{width:10px;height:10px;background:var(--accent);border-radius:50%;flex-shrink:0;margin-top:6px}
.qa-a-text{color:var(--text-primary);font-size:15px;line-height:1.8}
.post-content{font-size:18px;line-height:1.9;color:var(--text-primary);white-space:pre-wrap}

/* ── ADMIN STYLES ─────────────────────────── */
.adm-wrap{max-width:1080px;margin:0 auto;padding:40px 5%}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.stat{background:var(--bg-secondary);border-radius:16px;padding:24px 28px;border:1px solid var(--border-color, #E5E7EB);border-left:5px solid}
.tbl{background:var(--bg-secondary);border-radius:20px;border:1px solid var(--border-color, #E5E7EB);overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.tbl-head{padding:18px 28px;font-size:12px;font-weight:800;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;background:var(--bg-primary);border-bottom:1px solid var(--border-color, #E5E7EB)}
.tbl-row{display:flex;align-items:center;padding:18px 28px;border-bottom:1px solid var(--border-color, #E5E7EB);gap:16px;flex-wrap:wrap;transition:background .15s}
.tbl-row:hover{background:var(--bg-primary)}
.tbl-row:last-child{border:none}
.badge{display:inline-block;font-size:11px;font-weight:800;padding:4px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
.b-pub{background:#D1FAE5;color:#065F46}
.b-draft{background:#F3F4F6;color:#6B7280}
.b-sched{background:#FEF3C7;color:#92400E}

/* ── FORM STYLES ─────────────────────────── */
.ed-wrap{max-width:920px;margin:0 auto;padding:40px 5%}
.ed-card{background:var(--bg-secondary);padding:40px;border-radius:24px;border:1px solid var(--border-color, #E5E7EB);box-shadow:0 8px 40px rgba(0,0,0,.08)}
.flabel{display:block;font-size:12px;font-weight:700;color:var(--text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.8px}
.finput{width:100%;padding:14px 18px;border:1.5px solid var(--border-color, #E5E7EB);border-radius:12px;font-size:15px;color:var(--text-primary);background:var(--bg-secondary);transition:all .2s;outline:none;display:block}
.finput:focus{border-color:#0D9488;box-shadow:0 0 0 4px rgba(13,148,136,.1)}
.fg{margin-bottom:22px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 26px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:all .2s;white-space:nowrap}
.btn-p{background:#0D9488;color:#fff}
.btn-p:hover{background:#0F766E;transform:translateY(-1px);box-shadow:0 8px 24px rgba(13,148,136,.3)}
.btn-g{background:transparent;color:#6B7280;border:1.5px solid #E5E7EB}
.btn-g:hover{border-color:#0D9488;color:#0D9488}
.btn-d{background:transparent;color:#EF4444;border:1.5px solid #FECACA}
.btn-d:hover{background:#FEF2F2}

/* ── LOGIN ─────────────────────────────── */
.login-wrap{min-height:calc(100vh - 72px);display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#F0FDFA,#F5FFFA);padding:24px}
.login-card{background:#fff;padding:48px 44px;border-radius:24px;width:100%;max-width:440px;box-shadow:0 24px 80px rgba(13,148,136,.12)}
.login-icon{width:64px;height:64px;background:linear-gradient(135deg,#0D9488,#14B8A6);border-radius:20px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:20px}

/* ── FOOTER ─────────────────────────────── */
footer{background:var(--bg-primary);color:var(--text-secondary);text-align:center;padding:48px 5%;margin-top:64px}
footer strong{color:var(--text-primary);display:block;font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:8px}
</style>
</head>
<body>
<div id="toast-box"></div>
<div id="ck">
  <span style="flex:1;font-size:14px;color:#cbd5e1">🍪 We use cookies to improve your experience.</span>
  <button class="btn btn-p" onclick="setCk(1)" style="font-size:13px;padding:8px 20px">Accept All</button>
  <button class="btn" onclick="setCk(0)" style="font-size:13px;padding:8px 18px;color:#94a3b8;border:1px solid #334155;background:transparent">Decline</button>
</div>
<nav id="nav">
  <a href="/" class="nav-logo" id="logo">Qn<em>axia</em></a>
  <button id="theme-toggle" onclick="toggleTheme()" style="background:none;border:none;cursor:pointer;font-size:20px;padding:8px;border-radius:8px;color:var(--text-primary)">🌙</button>
</nav>
<div id="app"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────
// Long secret admin URL - hard to guess
var ADMIN_PATH = 'admin-panel-qnaxia-2026-super-secret-login';
// api.qnaxia.com is GREY CLOUD (no Cloudflare) — bypasses all bot detection
// This is why posts always show. Never change this back to /api.
var API  = 'https://api.qnaxia.com/api';
var SITE = 'Qnaxia';

// ── AUTH (JWT — no password in frontend) ─────────────────
var auth  = sessionStorage.getItem('admin-auth') === '1';
var TOKEN = sessionStorage.getItem('admin-token') || '';
function authHdr(){ return {'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'}; }
function doLogout(){
  sessionStorage.removeItem('admin-auth');
  sessionStorage.removeItem('admin-token');
  auth=false; TOKEN='';
  toast('Logged out successfully! 👋','ok');
  go('/');
}

// ── HELPERS ───────────────────────────────────────────────
var app=document.getElementById('app');
function ge(id){return document.getElementById(id);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function slugify(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||('p'+Date.now());}
function readTime(t){return Math.max(1,Math.round((String(t||'').trim().split(/\s+/).length)/200))+' min read';}
function fmtDate(d){return d?new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}):''}
function fmtLong(d){return d?new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}):''}

// ── TOAST ─────────────────────────────────────────────────
function toast(msg,type){
  var box=ge('toast-box'),el=document.createElement('div');
  el.className='t-item '+(type||'ok');el.textContent=msg;
  box.appendChild(el);
  setTimeout(function(){el.classList.add('show');},10);
  setTimeout(function(){el.classList.remove('show');setTimeout(function(){if(el.parentNode)box.removeChild(el);},300);},3200);
}

// ── COOKIE ────────────────────────────────────────────────
function initCk(){if(!sessionStorage.getItem('ck'))ge('ck').style.display='flex';}
function setCk(v){sessionStorage.setItem('ck',v?'1':'0');ge('ck').style.display='none';}

// ── THEME TOGGLE ─────────────────────────────────────────
var isDark=localStorage.getItem('theme')==='dark';
function toggleTheme(){
  isDark=!isDark;
  document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
  localStorage.setItem('theme',isDark?'dark':'light');
  document.getElementById('theme-toggle').textContent=isDark?'☀️':'🌙';
}
function initTheme(){
  isDark=localStorage.getItem('theme')==='dark';
  if(isDark){
    document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('theme-toggle').textContent='☀️';
  }
}

// ── Q&A PARSER ───────────────────────────────────────────
function parseQA(content){
  if(!content)return[];
  var lines=content.split('\n').map(function(l){return l.trim();}).filter(function(l){return l;});
  var pairs=[];
  var hasQPrefix=lines.some(function(l){return /^[Qq]\d*[\.\:\)]\s/.test(l);});
  if(hasQPrefix){
    var cur=null;
    lines.forEach(function(line){
      var qm=line.match(/^[Qq]\d*[\.\:\)]\s*(.+)/);
      var am=line.match(/^[Aa]\d*[\.\:\)]\s*(.+)/);
      if(qm){cur={q:qm[1].trim(),a:''};pairs.push(cur);}
      else if(am&&cur){cur.a=am[1].trim();}
    });
    if(pairs.filter(function(p){return p.a;}).length>0)return pairs;
  }
  var numReg=/^(\d+)[\.\)]\s+(.+)/;
  var hasNum=lines.some(function(l){return numReg.test(l);});
  if(hasNum){
    var i=0;
    while(i<lines.length){
      var qm=lines[i].match(numReg);
      if(qm&&i+1<lines.length){
        var ans=[],j=i+1;
        while(j<lines.length&&!numReg.test(lines[j])){ans.push(lines[j]);j++;}
        if(ans.length>0)pairs.push({q:qm[2].trim(),a:ans.join(' ').trim()});
        i=j;
      } else {i++;}
    }
    if(pairs.length>0)return pairs;
  }
  return[];
}

function renderQAHtml(pairs){
  if(!pairs||!pairs.length)return'';
  var html='<div class="qa-count">📚 '+pairs.length+' Questions &amp; Answers</div><div class="qa-list">';
  pairs.forEach(function(qa,i){
    html+='<div class="qa-item">'+
      '<div class="qa-q"><span class="qa-num">Q'+(i+1)+'</span><span class="qa-q-text">'+esc(qa.q)+'</span></div>'+
      '<div class="qa-a"><div class="qa-a-dot"></div><span class="qa-a-text">'+esc(qa.a)+'</span></div>'+
    '</div>';
  });
  return html+'</div>';
}

function renderContent(content){
  var pairs=parseQA(content);
  if(pairs.length>=2){
    var firstQ=content.search(/(\d+[\.\)]\s|[Qq]\d*[\.\:\)])/);
    var intro=firstQ>0?content.slice(0,firstQ).trim():'';
    return (intro?'<p class="qa-intro">'+esc(intro)+'</p>':'')+renderQAHtml(pairs);
  }
  return'<div class="post-content">'+esc(content)+'</div>';
}

// ── NAVBAR ────────────────────────────────────────────────
function updateNav(path){
  var nav=ge('nav'),logo=ge('logo');if(!nav)return;
  var onHero=(path==='/'||path==='');
  if(onHero){
    var sc=window.scrollY>70;
    nav.classList.toggle('solid',sc);
    nav.style.color=sc?'#1F2937':'#1F2937';
    if(logo)logo.style.color=sc?'#0D9488':'#0D9488';
  } else {
    nav.classList.add('solid');nav.style.color='#1F2937';
    if(logo)logo.style.color='#0D9488';
  }
}
window.addEventListener('scroll',function(){updateNav(getPath());});

// ── API helpers ───────────────────────────────────────────
function normalizePost(r){
  return{slug:r.slug||'',title:r.title||'',content:r.content||'',
    excerpt:r.excerpt||'',author:r.author||'Editor',tags:r.tags||'',
    coverUrl:r.cover_url||'',status:r.status||'draft',
    scheduleTime:r.schedule_time||'',publishedAt:r.published_at||'',
    createdAt:r.created_at||'',updatedAt:r.updated_at||'',qaPairs:r.qa_pairs||[]};
}

async function apiGet(path){
  var hdrs=auth?{'Authorization':'Bearer '+TOKEN}:{};
  var res=await fetch(API+path,{headers:hdrs});
  if(!res.ok)return null;
  // Guard: if Cloudflare returns HTML instead of JSON, catch it
  var ct=res.headers.get('content-type')||'';
  if(!ct.includes('json'))return null;
  return res.json();
}

async function loadPosts(){
  try{
    var url=auth?'/admin/posts':'/posts';
    var data=await apiGet(url);
    if(!data||!Array.isArray(data))return[];
    return data.map(normalizePost);
  }catch(e){console.error('loadPosts:',e);return[];}
}

async function fetchPost(slug){
  try{
    var data=await apiGet('/posts/'+encodeURIComponent(slug));
    return data?normalizePost(data):null;
  }catch(e){console.error('fetchPost:',e);return null;}
}

// ── ROUTER ────────────────────────────────────────────────
function go(path){history.pushState(null,'',path);route();}
function getPath(){return window.location.pathname;}
function route(){
  var path=getPath();
  window.scrollTo(0,0);
  updateNav(path);
  if(path==='/'||path===''){renderHome();return;}
  if(path==='/'+ADMIN_PATH){renderLogin();return;}
  if(path==='/'+ADMIN_PATH+'/dash'){renderDash();return;}
  if(path==='/'+ADMIN_PATH+'/new'){renderEditor('');return;}
  if(path.indexOf('/'+ADMIN_PATH+'/edit/')===0){renderEditor(path.slice(ADMIN_PATH.length+7));return;}
  if(path.indexOf('/post/')===0){renderPost(path.slice(6));return;}
  renderHome();
}

// ── SINGLE POST ───────────────────────────────────────────
async function renderPost(slug){
  app.innerHTML='<div style="padding-top:72px;text-align:center;padding:180px 20px;color:#94A3B8">'+
    '<div style="font-size:40px;margin-bottom:16px">⏳</div>Loading...</div>';
  var p=await fetchPost(slug);
  if(!p){
    app.innerHTML='<div style="padding-top:72px;text-align:center;padding:180px 20px">'+
      '<p style="font-size:64px;margin-bottom:18px">🔍</p>'+
      '<h2 style="font-size:28px;font-weight:800;margin-bottom:12px;color:#fff">Post Not Found</h2>'+
      '<p style="color:#94A3B8;margin-bottom:32px">This story may have been moved or deleted.</p>'+
      '<a href="/" class="btn btn-p">← Back to Home</a></div>';
    return;
  }
  var tags='';
  if(p.tags)p.tags.split(',').forEach(function(t){tags+='<span class="ph-tag">'+esc(t.trim())+'</span>';});
  var pairs=parseQA(p.content);
  if(pairs.length){
    var old=document.getElementById('faq-schema');if(old)old.remove();
    var sc=document.createElement('script');sc.id='faq-schema';sc.type='application/ld+json';
    sc.textContent=JSON.stringify({'@context':'https://schema.org','@type':'FAQPage',
      mainEntity:pairs.map(function(qa){return{'@type':'Question','name':qa.q,'acceptedAnswer':{'@type':'Answer','text':qa.a}};})});
    document.head.appendChild(sc);
  }
  document.title=p.title+' — '+SITE;
  var metaTags=[
    ['og:title',p.title],['og:description',p.excerpt||p.content.slice(0,160)],
    ['og:image',p.coverUrl||''],['og:url','https://qnaxia.com/#/post/'+p.slug],['og:type','article']
  ];
  metaTags.forEach(function(m){
    var el=document.querySelector('meta[property="'+m[0]+'"]');
    if(!el){el=document.createElement('meta');el.setAttribute('property',m[0]);document.head.appendChild(el);}
    el.setAttribute('content',m[1]);
  });

  // Cover image with dark gradient overlay if exists
  var coverHtml=p.coverUrl
    ?'<div style="max-width:1000px;margin:0 auto 48px;border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4)">'+
      '<img src="'+esc(p.coverUrl)+'" style="width:100%;max-height:450px;object-fit:cover;display:block" onerror="this.style.display=\'none\'"></div>'
    :'';

  app.innerHTML='<div style="padding-top:64px">'+
    '<div class="ph">'+
      '<div class="ph-content">'+
        coverHtml+
        (tags?'<div class="ph-tags">'+tags+'</div>':'')+
        '<h1>'+esc(p.title)+'</h1>'+
        '<div class="ph-meta">'+
          '<span class="author">✍️ '+esc(p.author)+'</span>'+
          '<span>•</span>'+
          '<span>'+fmtLong(p.publishedAt)+'</span>'+
          '<span>•</span>'+
          '<span>'+readTime(p.content)+'</span>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div class="post-body">'+
      renderContent(p.content)+
      '<div style="margin-top:48px;padding-top:32px;border-top:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px">'+
        '<a href="/" style="color:#0D9488;font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px">← All Stories</a>'+
        '<div style="display:flex;gap:16px;font-size:13px;color:#9CA3AF">'+
          '<span>'+fmtLong(p.publishedAt)+'</span>'+
          '<span>•</span>'+
          '<span>'+readTime(p.content)+'</span>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<footer><strong>'+SITE+'</strong>© '+new Date().getFullYear()+' '+SITE+'. All rights reserved.</footer></div>';
}

  app.innerHTML='<div style="padding-top:64px"><div class="login-wrap"><div class="login-card">'+

    '<div class="fg"><label class="flabel">Password</label>'+
    '<input id="pw" type="password" class="finput" placeholder="Enter admin password" autocomplete="current-password"></div>'+
    '<div id="lerr" style="display:none;color:#ef4444;font-size:13px;padding:10px 14px;background:#fef2f2;border-radius:7px;border:1px solid #fecaca;margin-bottom:14px">❌ Incorrect password.</div>'+

    '<p style="text-align:center;margin-top:20px"><a href="/" style="color:#9ca3af;font-size:13px">← Return to blog</a></p>'+
    '</div></div></div>';
  setTimeout(function(){
    var el=ge('pw');if(!el)return;el.focus();
    el.onkeydown=function(e){if(e.key==='Enter')doLogin();};
  },30);
}

async function doLogin(){
  var pw=ge('pw');if(!pw)return;
  var err=ge('lerr');if(err)err.style.display='none';
  try{
    var res=await fetch(API+'/auth/login',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({password:pw.value})
    });
    if(!res.ok){if(err)err.style.display='block';pw.value='';pw.focus();return;}
    var data=await res.json();
    if(!data.token){if(err)err.style.display='block';return;}
    TOKEN=data.token;
    sessionStorage.setItem('admin-auth','1');
    sessionStorage.setItem('admin-token',TOKEN);
    auth=true;
    toast('Logged in successfully! 👋','ok');
    go('/'+ADMIN_PATH+'/dash');
  }catch(e){if(err)err.style.display='block';pw.value='';pw.focus();}
}

async function delPost(slug){
  if(!confirm('Delete this post permanently?'))return;
  try{
    var res=await fetch(API+'/admin/posts/'+slug,{
      method:'DELETE',
      headers:{'Authorization':'Bearer '+TOKEN}
    });
    if(res.ok){
      toast('Post deleted! 🗑️','ok');
      renderDash();
    }else{
      toast('Delete failed: '+res.status,'err');
    }
  }catch(e){
    toast('Delete error: '+e.message,'err');
  }
}

function tglSched(){var b=ge('sb');if(b)b.style.display=ge('e-status').value==='scheduled'?'block':'none';}
function showErr(m){var e=ge('ed-err');if(e){e.textContent='⚠️ '+m;e.style.display='block';}}

async function savePost(existSlug){
  var ee=ge('ed-err');if(ee)ee.style.display='none';
  var title=(ge('e-title').value||'').trim();
  var content=(ge('e-content').value||'').trim();
  var status=ge('e-status').value;
  var schedEl=ge('e-sched'),sched=schedEl?schedEl.value:'';
  if(!title){showErr('Title is required.');return;}
  if(!content){showErr('Content is required.');return;}
  if(status==='scheduled'&&!sched){showErr('Please pick a publish date & time.');return;}
  var payload={
    slug:existSlug||slugify(title),title:title,content:content,status:status,
    schedule_time:status==='scheduled'?sched:null,
    cover_url:(ge('e-cover').value||'').trim(),
    author:(ge('e-author').value||'').trim(),
    tags:(ge('e-tags').value||'').trim(),
    excerpt:(ge('e-excerpt').value||'').trim(),
    qa_pairs:[]
  };
  try{
    var method=existSlug?'PUT':'POST';
    var url=existSlug?(API+'/admin/posts/'+existSlug):(API+'/admin/posts');
    var res=await fetch(url,{method:method,headers:authHdr(),body:JSON.stringify(payload)});
    if(!res.ok){var err=await res.json();throw new Error(err.error||'Save failed ('+res.status+')');}
    toast('Post saved! 🎉','ok');go('/'+ADMIN_PATH+'/dash');
  }catch(e){showErr(e.message);}
}
